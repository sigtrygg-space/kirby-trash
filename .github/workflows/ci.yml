name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - run: composer install --no-plugins --no-interaction --no-progress

      - run: vendor/bin/phpunit

  # the committed index.js/index.css must always match a fresh build
  # of the panel sources — a stale build must never reach main or a
  # release, since installs use the committed files as-is
  panel-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Fail if the committed build is stale
        run: |
          if ! git diff --exit-code -- index.js index.css; then
            echo "::error::index.js/index.css are stale — run 'npm run build' and commit the result"
            exit 1
          fi
